name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.12'
  AZURE_WEBAPP_NAME: roadtrip-api  # Update with your App Service name
  RESOURCE_GROUP: rg-roadtrip-prod  # Update with your resource group

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and activate virtual environment
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "*.db" \
            -x ".env" \
            -x "tests/*" \
            -x "venv/*" \
            -x ".git/*"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: backend-deploy.zip

  migrate:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Unzip artifact
        run: |
          mkdir backend-extracted
          unzip backend-deploy.zip -d backend-extracted

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend-extracted/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # To create AZURE_CREDENTIALS secret:
          # 1. Create service principal: az ad sp create-for-rbac --name "github-actions-roadtrip" --role contributor --scopes /subscriptions/{subscription-id}/resourceGroups/{resource-group} --sdk-auth
          # 2. Copy the JSON output to GitHub Secrets as AZURE_CREDENTIALS

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend-extracted
          python -m alembic upgrade head

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: backend-deploy.zip

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              MAPBOX_TOKEN='@Microsoft.KeyVault(VaultName=${{ secrets.KEY_VAULT_NAME }};SecretName=MapboxToken)' \
              GOOGLE_CLIENT_ID='@Microsoft.KeyVault(VaultName=${{ secrets.KEY_VAULT_NAME }};SecretName=GoogleClientId)' \
              SECRET_KEY='@Microsoft.KeyVault(VaultName=${{ secrets.KEY_VAULT_NAME }};SecretName=SecretKey)' \
              DATABASE_URL='@Microsoft.KeyVault(VaultName=${{ secrets.KEY_VAULT_NAME }};SecretName=DatabaseUrl)' \
              GEMINI_API_KEY='@Microsoft.KeyVault(VaultName=${{ secrets.KEY_VAULT_NAME }};SecretName=GeminiApiKey)' \
              ALLOWED_ORIGINS='${{ secrets.ALLOWED_ORIGINS }}' \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Set startup command
        run: |
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --startup-file "startup.sh"

      - name: Azure logout
        run: az logout

  validate:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Check backend health
        run: |
          echo "Waiting for app to start (30 seconds)..."
          sleep 30
          
          echo "Testing health endpoint..."
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1
          
          echo "Testing API health endpoint..."
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health || exit 1
          
          echo "Backend health check passed!"
