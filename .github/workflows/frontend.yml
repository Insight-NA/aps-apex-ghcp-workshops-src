name: Deploy Frontend to Azure Static Web Apps [DISABLED]

# WORKFLOW DISABLED - Static web app deployment disabled
on:
  workflow_dispatch:  # Only manual trigger allowed (for emergency use)
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'frontend/**'
  #     - '.github/workflows/frontend.yml'

env:
  NODE_VERSION: '18.x'
  STATICWEB_NAME: roadtrip-frontend-hl
  STATICWEB_HOSTNAME: wonderful-sea-0daaadb10.3.azurestaticapps.net

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run linter
        run: |
          cd frontend
          npm run lint
        continue-on-error: true

      - name: Build application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}  # e.g., https://roadtrip-api.azurewebsites.net
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: |
          cd frontend
          npm run build

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          # To get this token:
          # 1. Go to Azure Portal > Static Web Apps > your app > Manage deployment token
          # 2. Copy the token and add to GitHub Secrets as AZURE_STATIC_WEB_APPS_API_TOKEN
          # OR run: az staticwebapp secrets list --name roadtrip-frontend-hl --resource-group aps-demo-rg
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend'
          output_location: 'dist'
          skip_app_build: true  # We already built in previous step
          skip_deploy_on_missing_secrets: true

  validate:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Check frontend deployment
        run: |
          echo "Waiting for deployment to complete (30 seconds)..."
          sleep 30
          
          echo "Testing frontend URL..."
          curl -f https://${{ env.STATICWEB_HOSTNAME }} || exit 1
          
          echo "Frontend deployment validated!"
