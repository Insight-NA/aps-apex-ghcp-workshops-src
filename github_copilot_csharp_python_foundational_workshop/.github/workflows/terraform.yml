# Terraform CI/CD Pipeline — Road Trip Planner
# Validates, plans, and applies Terraform infrastructure changes.
# Follows cicd.instructions.md: delegates all logic to infrastructure/scripts/terraform-ci.sh
#
# Environments:
#   dev  — auto-apply on push to main
#   uat  — plan on PR, manual apply
#   stage/prod — plan on PR, apply requires GitHub Environment approval

name: Terraform CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform.yml'
      - 'infrastructure/scripts/terraform-ci.sh'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform.yml'
      - 'infrastructure/scripts/terraform-ci.sh'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - stage
          - prod
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - validate
          - plan
          - apply

permissions:
  contents: read
  pull-requests: write       # Comment plan output on PRs
  id-token: write            # OIDC for Azure login

env:
  TF_VERSION: '1.7.0'
  WORKING_DIR: 'infrastructure/terraform'

# ─── Jobs ────────────────────────────────────────────────────────────────────

jobs:
  # ── Validate ───────────────────────────────────────────────────────────────
  validate:
    name: 'Validate (${{ github.event.inputs.environment || ''dev'' }})'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Init
        run: terraform init -backend=false -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ${{ env.WORKING_DIR }}

  # ── Plan (dev) ─────────────────────────────────────────────────────────────
  plan-dev:
    name: 'Plan (dev)'
    needs: validate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Plan (dev)
        run: ./infrastructure/scripts/terraform-ci.sh --action plan --environment dev
        env:
          TF_VAR_mapbox_token: ${{ secrets.TF_VAR_MAPBOX_TOKEN }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
          TF_VAR_azure_maps_key: ${{ secrets.TF_VAR_AZURE_MAPS_KEY }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.WORKING_DIR }}/tfplan-dev.out
          retention-days: 5

  # ── Apply (dev) — auto on push to main ─────────────────────────────────────
  apply-dev:
    name: 'Apply (dev)'
    needs: plan-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply (dev)
        run: ./infrastructure/scripts/terraform-ci.sh --action apply --environment dev
        env:
          TF_VAR_mapbox_token: ${{ secrets.TF_VAR_MAPBOX_TOKEN }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
          TF_VAR_azure_maps_key: ${{ secrets.TF_VAR_AZURE_MAPS_KEY }}

  # ── Plan (prod) — manual dispatch only ─────────────────────────────────────
  plan-prod:
    name: 'Plan (prod)'
    needs: validate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod'
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Plan (prod)
        run: ./infrastructure/scripts/terraform-ci.sh --action plan --environment prod
        env:
          TF_VAR_mapbox_token: ${{ secrets.TF_VAR_MAPBOX_TOKEN }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
          TF_VAR_azure_maps_key: ${{ secrets.TF_VAR_AZURE_MAPS_KEY }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}/tfplan-prod.out
          retention-days: 5

  # ── Apply (prod) — requires GitHub Environment approval ────────────────────
  apply-prod:
    name: 'Apply (prod)'
    needs: plan-prod
    runs-on: ubuntu-latest
    environment: production     # Requires reviewer approval in GitHub Settings
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply (prod)
        run: ./infrastructure/scripts/terraform-ci.sh --action apply --environment prod
        env:
          TF_VAR_mapbox_token: ${{ secrets.TF_VAR_MAPBOX_TOKEN }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
          TF_VAR_azure_maps_key: ${{ secrets.TF_VAR_AZURE_MAPS_KEY }}
