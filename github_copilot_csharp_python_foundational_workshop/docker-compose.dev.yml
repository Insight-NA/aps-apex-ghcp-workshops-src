# Docker Compose for Development
# Runs both OLD and NEW frontends simultaneously with hot-reload
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#
# Access:
#   - Gateway: http://localhost:8080
#   - NEW Frontend (direct): http://localhost:3001
#   - OLD Frontend (direct): http://localhost:3000
#   - Backend API: http://localhost:8000
#   - AI Service: http://localhost:8001

version: '3.8'

services:
  # ============================================
  # DATABASE SERVICES
  # ============================================
  
  postgres:
    image: postgres:15-alpine
    container_name: roadtrip-postgres
    environment:
      POSTGRES_USER: roadtrip
      POSTGRES_PASSWORD: roadtrip_dev
      POSTGRES_DB: roadtrip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadtrip"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roadtrip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND SERVICES
  # ============================================

  backend:
    build: ./backend
    container_name: roadtrip-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://roadtrip:roadtrip_dev@postgres:5432/roadtrip
      - REDIS_URL=redis://redis:6379
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
      - AZURE_MAPS_KEY=${AZURE_MAPS_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - AI_SERVICE_URL=http://ai-service:8080
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    container_name: roadtrip-ai-service
    ports:
      - "8001:8080"
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FRONTEND SERVICES (Development with hot-reload)
  # ============================================

  old-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: roadtrip-old-frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - backend

  new-frontend:
    build:
      context: ./new_front_end
      dockerfile: Dockerfile.dev
    container_name: roadtrip-new-frontend
    ports:
      - "3001:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_AI_CHAT_URL=http://localhost:8080/ai
      - VITE_AUTH_URL=http://localhost:8080/api/auth
      - VITE_ENABLE_AI_CHAT=true
    volumes:
      - ./new_front_end/src:/app/src
      - ./new_front_end/public:/app/public
      - ./new_front_end/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - backend
      - ai-service

  # ============================================
  # GATEWAY (Nginx reverse proxy)
  # ============================================

  gateway:
    image: nginx:alpine
    container_name: roadtrip-gateway
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - old-frontend
      - new-frontend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: roadtrip-network
