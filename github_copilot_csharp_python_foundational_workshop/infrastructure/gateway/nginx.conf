# Nginx Gateway Configuration
# Routes traffic to OLD (/v1) and NEW (/v2) frontends

upstream old_frontend {
    server old-frontend:80;
}

upstream new_frontend {
    server new-frontend:80;
}

upstream backend {
    server backend:8000;
}

upstream ai_service {
    server ai-service:8080;
}

server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /health {
        return 200 'gateway healthy';
        add_header Content-Type text/plain;
    }

    # API routes - proxy to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # AI service routes
    location /ai/ {
        rewrite ^/ai/(.*) /api/v1/$1 break;
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # NEW frontend (AI-driven) - /v2 prefix or root
    location /v2 {
        rewrite ^/v2/(.*) /$1 break;
        proxy_pass http://new_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # OLD frontend - /v1 prefix
    location /v1 {
        rewrite ^/v1/(.*) /$1 break;
        proxy_pass http://old_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Default: serve NEW frontend (progressive rollout)
    # Change to old_frontend during initial migration
    location / {
        proxy_pass http://new_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket support for Vite HMR (development)
    location /ws {
        proxy_pass http://new_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
